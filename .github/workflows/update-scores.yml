name: Update World Cup scores

on:
  schedule:
    # World Cup 2026 group-stage kickoffs cluster into a handful of recurring
    # ET slots (noon, early/mid afternoon, evening, late night), which in UTC
    # (EDT = UTC-4 through the whole tournament) span roughly 16:00 to 04:30
    # the next day. A match takes ~2 hours including stoppage (a bit more
    # for knockout games that go to extra time/penalties), so these runs sit
    # about 2.5 hours after each kickoff cluster — late enough that ESPN has
    # usually marked the game "completed," early enough to catch it same day.
    # :30 instead of :00 also dodges GitHub's busiest top-of-the-hour minute
    # for scheduled runs.
    - cron: '30 18,20,22,0,2,4,6 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest scores
        run: python scripts/update_scores.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "score-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet || git commit -m "Update scores ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
  schedule:
    # World Cup 2026 group-stage kickoffs cluster into a handful of recurring
    # ET slots (noon, early/mid afternoon, evening, late night), which in UTC
    # (EDT = UTC-4 through the whole tournament) span roughly 16:00 to 04:30
    # the next day. A match takes ~2 hours including stoppage (a bit more
    # for knockout games that go to extra time/penalties), so these runs sit
    # about 2.5 hours after each kickoff cluster — late enough that ESPN has
    # usually marked the game "completed," early enough to catch it same day.
    # :30 instead of :00 also dodges GitHub's busiest top-of-the-hour minute
    # for scheduled runs.
    - cron: '30 18,20,22,0,2,4,6 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
 
permissions:
  contents: write
 
