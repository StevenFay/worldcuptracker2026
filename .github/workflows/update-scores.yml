name: Update World Cup scores

on:
  schedule:
    # 09:00 UTC daily. GitHub may delay scheduled runs by a few minutes
    # during busy periods — that's normal. Add more cron lines below if
    # you want it to run more than once a day (e.g. every 3 hours on
    # match days): '0 */3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest scores
        run: python scripts/update_scores.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "score-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet || git commit -m "Update scores ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
